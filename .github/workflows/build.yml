name: Build and Deploy SoccerCut Pro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-14

    strategy:
      matrix:
        include:
          - scheme: Subscription
            bundle_id: blog.daichimatsumoto.SoccerCut-Pro
            profile_name: SoccerCut Pro Subscription
          - scheme: Paid
            bundle_id: blog.daichimatsumoto.SoccerCut-Pro-Paid
            profile_name: SoccerCut Pro Paid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install certificate & provisioning profile
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          PROVISIONING_PROFILE_SUBSCRIPTION: ${{ secrets.PROVISIONING_PROFILE_SUBSCRIPTION }}
          PROVISIONING_PROFILE_PAID: ${{ secrets.PROVISIONING_PROFILE_PAID }}
          SCHEME: ${{ matrix.scheme }}
        run: |
          mkdir -p ~/certs

          # Decode p12
          echo "$MAC_CERTIFICATE_P12" | base64 -d > ~/certs/mac_distribution.p12

          # Setup keychain
          security create-keychain -p "build" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain

          # Import p12 directly
          security import ~/certs/mac_distribution.p12 \
            -k ~/Library/Keychains/build.keychain \
            -f pkcs12 \
            -P "" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" ~/Library/Keychains/build.keychain
          security list-keychains -s ~/Library/Keychains/build.keychain ~/Library/Keychains/login.keychain-db

          # Show imported identities
          security find-identity -v -p codesigning

          # Install provisioning profile
          if [ "$SCHEME" = "Subscription" ]; then
            echo "$PROVISIONING_PROFILE_SUBSCRIPTION" | base64 -d > ~/certs/profile.provisionprofile
          else
            echo "$PROVISIONING_PROFILE_PAID" | base64 -d > ~/certs/profile.provisionprofile
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i ~/certs/profile.provisionprofile | plutil -extract UUID raw -)
          cp ~/certs/profile.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.provisionprofile

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions-${{ matrix.scheme }}.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ matrix.bundle_id }}</key>
                  <string>${{ matrix.profile_name }}</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Archive ${{ matrix.scheme }}
        run: |
          xcodebuild archive \
            -project "SoccerCut Pro.xcodeproj" \
            -scheme "${{ matrix.scheme }}" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "build/${{ matrix.scheme }}.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Mac App Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ matrix.profile_name }}"

      - name: Export archive ${{ matrix.scheme }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/${{ matrix.scheme }}.xcarchive" \
            -exportPath "build/${{ matrix.scheme }}-export" \
            -exportOptionsPlist "ExportOptions-${{ matrix.scheme }}.plist"

      - name: Upload artifact ${{ matrix.scheme }}
        uses: actions/upload-artifact@v4
        with:
          name: SoccerCut-Pro-${{ matrix.scheme }}
          path: build/${{ matrix.scheme }}-export/
          retention-days: 7

      - name: Create API Key file
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" | base64 -d > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file "$(find build/${{ matrix.scheme }}-export -name '*.pkg' | head -1)" \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      - name: Clean up
        if: always()
        run: |
          rm -f ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          rm -rf ~/certs
          security delete-keychain build.keychain || true
